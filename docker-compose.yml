version: "3.9"

services:
  copilot-api:
    build: .
    ports:
      - "8000:8000"
    env_file:
      - .env
    volumes:
      # Live-editable data and persistent vector store, without rebuilding the image
      - ./data:/app/data
      - ./vector_store:/app/vector_store
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/health"]
      interval: 15s
      timeout: 5s
      retries: 5

  copilot-ui:
    build: .
    command: streamlit run streamlit_app/app.py --server.address=0.0.0.0 --server.port=8501
    ports:
      - "8501:8501"
    environment:
      # Container-to-container hostname, not localhost - Streamlit talks to
      # the API service by its compose service name on the shared network.
      - API_BASE=http://copilot-api:8000
    depends_on:
      - copilot-api

